<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physiophixx | Clinic Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&family=Playfair+Display:wght@600;700;800&family=Merriweather:wght@700;900&family=Raleway:wght@600;700;800&family=Lora:wght@600;700&family=Nunito:wght@700;800&family=Quicksand:wght@600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal-900:#0b3b3a;
  --teal-800:#0f5753;
  --teal-700:#0f766e;
  --teal-600:#14a098;
  --teal-100:#e3f6f4;
  --teal-50:#f2fbfa;
  --amber:#e8a33d;
  --amber-dark:#c8811f;
  --ink:#1c2a2a;
  --slate:#5c6b6a;
  --line:#dbe7e5;
  --bg:#f4f8f7;
  --card:#ffffff;
  --danger:#d1495b;
  --radius:14px;
  --shadow: 0 2px 10px rgba(15,87,83,.06), 0 1px 2px rgba(15,87,83,.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Poppins',sans-serif;margin:0;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#c3d8d5;border-radius:8px;}

/* ---------- App shell ---------- */
#app{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{
  width:236px;flex-shrink:0;background:linear-gradient(180deg,var(--teal-900),var(--teal-800));
  color:#eafaf7;display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;
}
.brand-mini{display:flex;align-items:center;gap:10px;padding:6px 8px 22px 8px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:16px;}
.brand-mini .logo-box{width:40px;height:40px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:3px;}
.brand-mini .logo-box img{max-width:100%;max-height:100%;object-fit:contain;}
.brand-mini .logo-fallback{width:40px;height:40px;border-radius:10px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-weight:800;color:#3a2a06;font-family:'Poppins';flex-shrink:0;}
.brand-mini .name{font-family:'Poppins';font-weight:700;font-size:15px;line-height:1.2;}
.brand-mini .tag{font-size:10.5px;opacity:.65;letter-spacing:.4px;}
.brand-mini .slogan{font-size:9.5px;opacity:.7;font-style:italic;margin-top:1px;}

.nav-item{
  display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:11px;color:#cfe9e5;
  font-size:14px;font-weight:500;margin-bottom:4px;transition:.15s;user-select:none;
}
.nav-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--accent-soft);transition:.15s;}
.nav-icon svg{width:16.5px;height:16.5px;color:var(--accent);opacity:1;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item:hover .nav-icon{background:var(--accent);}
.nav-item:hover .nav-icon svg{color:#fff;}
.nav-item.active{background:linear-gradient(90deg, rgba(255,255,255,.14), rgba(255,255,255,.05));color:#fff;font-weight:700;box-shadow:inset 3px 0 0 var(--accent);}
.nav-item.active .nav-icon{background:var(--accent);box-shadow:0 3px 10px -2px var(--accent);}
.nav-item.active .nav-icon svg{color:#fff;}
.sidebar-foot{margin-top:auto;padding:12px 8px;font-size:11px;opacity:.55;}
.admin-lock-indicator{display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:9px;background:rgba(255,255,255,.07);color:#cfe9e5;font-size:11.5px;font-weight:700;cursor:pointer;margin-top:10px;}
.admin-lock-indicator svg{width:15px;height:15px;flex-shrink:0;}
.admin-lock-indicator.unlocked{background:rgba(232,163,61,.18);color:var(--amber);}
.admin-lock-indicator:hover{background:rgba(255,255,255,.14);}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:var(--card);border-bottom:1px solid var(--line);padding:14px 26px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20;
}
.clinic-head{display:flex;align-items:center;gap:14px;}
.clinic-head .logo-box{width:56px;height:56px;border-radius:12px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:4px;}
.clinic-head .logo-box img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;}
.clinic-head .logo-fallback{width:56px;height:56px;border-radius:12px;background:var(--teal-100);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--teal-700);font-family:'Poppins';font-size:20px;flex-shrink:0;}
.clinic-head .cname{font-family:'Poppins';font-weight:800;font-size:19px;color:var(--teal-900);line-height:1.15;}
.clinic-head .slogan{font-size:11.5px;font-style:italic;color:var(--teal-600);font-weight:600;margin-top:1px;}
.clinic-head .cmeta{font-size:11.5px;color:var(--slate);display:flex;flex-wrap:wrap;gap:2px 12px;margin-top:3px;}
.clinic-head .cmeta span{white-space:nowrap;}
.topbar-right{font-size:13px;color:var(--slate);text-align:right;}
.topbar-right .date{font-weight:600;color:var(--teal-800);}

.view{padding:24px 26px 60px 26px;display:none;}
.view.active{display:block;}

/* Page heading */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.page-head h2{font-size:21px;color:var(--teal-900);}
.page-head p{margin:2px 0 0 0;color:var(--slate);font-size:13px;}

/* Buttons */
.btn{border:none;border-radius:9px;padding:10px 16px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.15s;}
.btn-primary{background:linear-gradient(135deg, var(--teal-600), var(--teal-800));color:#fff;box-shadow:0 2px 8px -2px rgba(15,87,83,.4);}
.btn-primary:hover{background:linear-gradient(135deg, var(--teal-700), var(--teal-900));}
.btn-amber{background:linear-gradient(135deg, #f2b955, var(--amber-dark));color:#3a2a06;box-shadow:0 2px 8px -2px rgba(200,129,31,.4);}
.btn-amber:hover{background:var(--amber-dark);color:#fff;}
.btn-ghost{background:var(--teal-50);color:var(--teal-800);border:1px solid var(--line);}
.btn-ghost:hover{background:var(--teal-100);}
.btn-danger{background:#fdecee;color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:7px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.pad{padding:20px;}

/* Dashboard stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent, var(--teal-600));}
.stat-card .icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-card .icon svg{width:20px;height:20px;}
.stat-card .num{font-family:'Poppins';font-size:26px;font-weight:800;color:var(--teal-900);}
.stat-card .lbl{font-size:12.5px;color:var(--slate);margin-top:2px;}
.dash-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}
@media(max-width:980px){.dash-grid{grid-template-columns:1fr;}}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;background:var(--teal-50);color:var(--teal-800);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;font-size:12px;text-transform:uppercase;letter-spacing:.3px;}
td{padding:10px 12px;border-bottom:1px solid #eef3f2;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--teal-50);}
.patient-link{color:var(--teal-700);font-weight:700;text-decoration:none;cursor:pointer;}
.patient-link:hover{text-decoration:underline;color:var(--teal-800);}
.table-wrap{overflow-x:auto;}
.empty-row td{text-align:center;color:var(--slate);padding:26px;font-size:13px;}

/* Forms */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 16px;}
.form-grid.cols-3{grid-template-columns:repeat(3,1fr);}
@media(max-width:700px){.form-grid,.form-grid.cols-3{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field.span2{grid-column:span 2;}
@media(max-width:700px){.field.span2{grid-column:span 1;}}
.field label{font-size:12px;font-weight:600;color:var(--teal-800);}
.field .hint{font-size:11px;color:var(--slate);font-weight:400;}
.field input[type=text],.field input[type=number],.field input[type=email],.field input[type=tel],.field input[type=date],.field input[type=time],.field select,.field textarea{
  border:1.5px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13.5px;color:var(--ink);background:#fff;outline:none;transition:.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal-600);box-shadow:0 0 0 3px rgba(20,160,152,.13);}
.field textarea{resize:vertical;min-height:60px;}
.radio-row{display:flex;gap:16px;align-items:center;padding-top:4px;}
.radio-row label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;}
fieldset{border:1.5px dashed var(--line);border-radius:10px;padding:14px 14px 16px 14px;margin:0;}
legend{font-size:12px;font-weight:700;color:var(--teal-700);padding:0 6px;}

/* badges */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge.green{background:#e2f6ea;color:#1e7e42;}
.badge.amber{background:#fdf1de;color:var(--amber-dark);}
.badge.red{background:#fdecee;color:var(--danger);}
.badge.gray{background:#eef2f1;color:var(--slate);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(11,59,58,.45);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow-y:auto;}
.modal-bg.active{display:flex;}
.modal{background:#fff;border-radius:16px;max-width:640px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:pop .15s ease;}
.modal.wide{max-width:800px;}
@keyframes pop{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);}
.modal-head h3{font-size:16px;color:var(--teal-900);}
.modal-close{background:none;border:none;font-size:20px;color:var(--slate);line-height:1;padding:4px;}
.modal-back{display:flex;align-items:center;gap:4px;background:var(--teal-50);border:1px solid var(--line);border-radius:8px;padding:6px 10px 6px 8px;color:var(--teal-700);font-size:12.5px;font-weight:700;margin-right:4px;}
.modal-back svg{width:16px;height:16px;}
.modal-back:hover{background:var(--teal-100);}
.modal-body{padding:20px 22px;max-height:70vh;overflow-y:auto;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}

/* search bar */
.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search-bar input{flex:1;min-width:220px;border:1.5px solid var(--line);border-radius:9px;padding:9px 12px;font-size:13.5px;outline:none;}
.search-bar input:focus{border-color:var(--teal-600);}

/* Toast */
#toast{position:fixed;bottom:22px;right:22px;background:var(--teal-900);color:#fff;padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:300;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

/* Doctor schedule builder */
.day-row{display:grid;grid-template-columns:90px 1fr 1fr auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #eef3f2;}
.day-row:last-child{border-bottom:none;}
.day-row .dname{font-size:13px;font-weight:600;color:var(--teal-800);}
.toggle{display:flex;align-items:center;gap:7px;font-size:12px;}

/* slot grid */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin-top:10px;}
.slot{border:1.5px solid var(--line);border-radius:8px;padding:8px 6px;text-align:center;font-size:12.5px;font-weight:600;cursor:pointer;background:#fff;color:var(--teal-800);}
.slot:hover{border-color:var(--teal-600);}
.slot.selected{background:var(--teal-700);color:#fff;border-color:var(--teal-700);}
.slot.booked{background:#f2f2f2;color:#b3b3b3;border-color:#eee;cursor:not-allowed;text-decoration:line-through;}
.slot.lunch{background:#fdf1de;color:var(--amber-dark);cursor:not-allowed;border-color:#f5e2bd;}

/* billing */
.item-row{display:grid;grid-template-columns:1fr 110px 110px 34px;gap:8px;margin-bottom:8px;align-items:center;}
.item-row input{border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;}
.remove-item{background:#fdecee;color:var(--danger);border:none;border-radius:7px;width:30px;height:30px;font-size:15px;}
.bill-summary{margin-top:14px;border-top:2px dashed var(--line);padding-top:12px;}
.bill-summary .row{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;}
.bill-summary .row.total{font-size:17px;font-weight:800;color:var(--teal-800);border-top:1px solid var(--line);margin-top:6px;padding-top:10px;}

/* Payment method icon grid */
.pay-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px;margin-top:6px;}
.pay-btn{display:flex;flex-direction:column;align-items:center;gap:6px;border:1.5px solid var(--line);border-radius:11px;padding:10px 6px;background:#fff;font-size:11.5px;font-weight:700;color:var(--ink);transition:.15s;}
.pay-btn:hover{border-color:var(--teal-600);}
.pay-btn.selected{border-color:var(--teal-700);background:var(--teal-50);box-shadow:0 0 0 3px rgba(20,160,152,.13);}
.pay-icon{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);}
.pay-icon span{display:flex;align-items:center;justify-content:center;}
.pay-icon svg{width:100%;height:100%;}
.pay-chip{display:inline-flex;align-items:center;gap:6px;font-weight:700;}

/* Theme swatches */
.theme-grid{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;}
.theme-swatch{width:64px;cursor:pointer;text-align:center;}
.theme-swatch .dots{display:flex;height:34px;border-radius:10px;overflow:hidden;border:1.5px solid var(--line);}
.theme-swatch .dots span{flex:1;}
.theme-swatch.active .dots{border-color:var(--teal-700);box-shadow:0 0 0 3px rgba(20,160,152,.18);}
.theme-swatch .tname{font-size:10.5px;margin-top:5px;color:var(--slate);font-weight:600;}

/* receipt */
.receipt-preview{background:#fff;}
.receipt{width:100%;max-width:420px;margin:0 auto;padding:12px;font-family:'Inter',sans-serif;color:#111;}
.receipt .r-head{display:grid;grid-template-columns:46px 1fr 46px;align-items:stretch;gap:8px;border-bottom:2px solid var(--teal-700);padding-bottom:6px;margin-bottom:6px;}
.receipt .r-head .logo-box{background:none;border:none;border-radius:0;display:flex;align-items:center;justify-content:flex-start;overflow:hidden;}
.receipt .r-head .logo-box img{max-height:100%;max-width:46px;width:auto;height:auto;object-fit:contain;}
.receipt .r-head .r-head-text{text-align:center;}
.receipt .r-head .cname{font-family:'Poppins';font-weight:800;font-size:15px;color:var(--teal-800);line-height:1.2;}
.receipt .r-head .slogan{font-size:9.5px;font-style:italic;color:var(--teal-600);font-weight:600;}
.receipt .r-head .cmeta{font-size:10px;color:#555;margin-top:2px;line-height:1.4;}
.receipt .r-printed{text-align:right;font-size:9px;color:#888;margin-top:6px;}
.receipt .r-title{text-align:center;font-weight:700;letter-spacing:.6px;font-size:12.5px;margin:5px 0 3px 0;text-transform:uppercase;color:var(--teal-700);}
.receipt .r-copy{text-align:center;font-size:9.5px;font-weight:700;color:var(--amber-dark);margin-bottom:4px;}
.receipt .r-meta{display:flex;justify-content:space-between;font-size:11px;margin:2px 0;gap:8px;}
.receipt table{margin:7px 0;font-size:11px;border-collapse:collapse;}
.receipt th{background:#f2f7f6;font-size:9.5px;padding:5px 6px;}
.receipt td{padding:5px 6px;font-size:11px;}
.receipt .r-total{border-top:1.5px dashed #999;margin-top:5px;padding-top:5px;}
.receipt .r-total .row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;}
.receipt .r-total .row.grand{font-weight:800;font-size:15px;color:var(--teal-800);}
.receipt .r-foot{text-align:center;font-size:10.5px;color:#666;margin-top:10px;border-top:1px solid #ddd;padding-top:6px;}
.receipt .r-sign{display:flex;justify-content:space-between;margin-top:20px;font-size:10.5px;}
.receipt .r-sign div{border-top:1px solid #999;padding-top:4px;width:42%;text-align:center;}

/* Settings */
.logo-upload{display:flex;align-items:center;gap:16px;}
.logo-upload .preview-box{width:88px;height:88px;border-radius:14px;border:1.5px solid var(--line);background:var(--teal-50);display:flex;align-items:center;justify-content:center;overflow:hidden;padding:6px;}
.logo-upload .preview-box img{max-width:100%;max-height:100%;object-fit:contain;}
.logo-upload .preview-box span{font-family:'Poppins';font-weight:800;font-size:28px;color:var(--teal-700);}

/* Print */
#printArea{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block;position:absolute;left:0;top:0;width:100%;}
  .receipt{max-width:100%;page-break-after:always;}
  .receipt:last-child{page-break-after:auto;}
  @page{size:A5;margin:8mm;}
}

/* mobile */
@media(max-width:840px){
  .sidebar{position:fixed;left:-240px;z-index:200;transition:.2s;box-shadow:0 0 40px rgba(0,0,0,.3);}
  .sidebar.open{left:0;}
  .menu-btn{display:flex !important;}
  .clinic-head .cmeta{display:none;}
}
.menu-btn{display:none;align-items:center;justify-content:center;width:38px;height:38px;border-radius:9px;background:var(--teal-50);border:1px solid var(--line);}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:190;display:none;}
.overlay-bg.active{display:block;}
</style>
</head>
<body>
<div id="app"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div id="toast"></div>
<div class="overlay-bg" id="overlayBg"></div>
<div id="printArea"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
